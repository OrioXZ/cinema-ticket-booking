x-mongo-config:
  database: &mongo-database ${MONGO_DATABASE:-cinema}
  username: &mongo-username ${MONGO_USERNAME:-cinema}
  password: &mongo-password ${MONGO_PASSWORD:-cinema_dev_password}

services:
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: *mongo-database
      MONGO_INITDB_ROOT_USERNAME: *mongo-username
      MONGO_INITDB_ROOT_PASSWORD: *mongo-password
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.0-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--notify-keyspace-events",
        "Ex",
      ]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_MODE: ${AUTH_MODE:-development}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      BACKEND_PORT: "8080"
      MONGO_DATABASE: *mongo-database
      MONGO_HOST: "mongodb:27017"
      MONGO_USERNAME: *mongo-username
      MONGO_PASSWORD: *mongo-password
      REDIS_URI: ${REDIS_URI:-redis://redis:6379/0}
      EVENT_CHANNEL: ${EVENT_CHANNEL:-cinema.events}
      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-development}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_DEV_USER_ID: ${VITE_DEV_USER_ID:-user-1}
        VITE_DEV_USER_ROLE: ${VITE_DEV_USER_ROLE:-USER}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
